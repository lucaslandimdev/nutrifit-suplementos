<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - NUTRIFIT SUPLEMENTOS</title>
    <link rel="stylesheet" href="estilo/tela_login.css">
    <script src="https://kit.fontawesome.com/76e2d6c870.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>NUTRIFIT SUPLEMENTOS</li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="login">
            <form class="form_login">
                <h3>ACESSO DO USUÁRIO</h3>
                <p>ENTRE PARA SUA ZONA DE PERFOMANCE</p>
                <label for="email">E-MAIL</label>
                <input type="email" name="email" id="email" placeholder="seu@email.com">

                <label for="senha">SENHA</label>
                <input type="password" name="senha" id="senha" placeholder="**********">

                <button type="submit" class="btn-entrar">ENTRAR</button>

                <div style="display: flex; align-items: center; text-align: center; color: white;">
                    <div style="flex: 1; border-bottom: 1px solid #333;"></div>
                    <span style="padding: 0 10px;">OU CONTINUE COM</span>
                    <div style="flex: 1; border-bottom: 1px solid #333;"></div>
                </div>
                <div class="btns-opcoes-login">
                    <a href="#" class="btn btn-google"><i class="fa-brands fa-google"></i> GOOGLE</a>
                    <a href="#" class="btn btn-apple"><i class="fa-brands fa-apple"></i> APPLE</a>
                </div>
                <p>NÃO TEM CONTA? <a href="tela_cadastro.html" class="destaque-form">CRIE AGORA</a></p>
            </form>
        </section>
    </main>
</body>

</html>
